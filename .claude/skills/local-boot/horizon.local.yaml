# Static local-boot config for the Horizon UI BFF. Defaults to a LOCAL
# OAP on 127.0.0.1 with NO network auth, but the four OAP fields below
# accept env-var overrides so the same file boots against a remote OAP
# (any URL), a deliberately-unreachable port (for the "OAP unreachable"
# landing-block preview), or any other no-auth OAP. For demo-OAP access
# use horizon.demo.yaml instead, which keeps the password out of git
# via ${OAP_PASSWORD}.
#
# Boot via the `local-boot` skill (see SKILL.md) which passes this
# file through HORIZON_CONFIG as an ABSOLUTE path. The local-user
# password hashes below are throwaway dev credentials (password ==
# username) — safe to commit; do NOT add real secrets here.

server:
  host: 127.0.0.1
  port: ${BFF_PORT:8081}

oap:
  # On the default LOCAL OAP, GraphQL and the admin REST surface share
  # the same port (12800). On the public demo and some k8s deployments
  # they split (12800 / 17128) — override OAP_ADMIN_URL accordingly.
  # Zipkin (9412) may not be exposed locally.
  queryUrl: ${OAP_QUERY_URL:http://localhost:12800}
  adminUrl: ${OAP_ADMIN_URL:http://localhost:12800}
  zipkinUrl: ${OAP_ZIPKIN_URL:http://localhost:9412/zipkin}
  timeoutMs: ${OAP_TIMEOUT_MS:15000}

auth:
  backend: local
  local:
    # One account per role for manual menu-RBAC checks. Password == username.
    users:
      - username: viewer
        # password: viewer
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$Gp175hqr+EF2iZ7v1fndvw$w6w9hDI59/UA+CRARChDoGRlR1TkVt6kqzApa021K+0"
        roles: [viewer]
      - username: maintainer
        # password: maintainer
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$w7ULwB3/jzH9FxVoHJ238A$y+qGoX6IPeOoGywLQCpfpAN5VJXcaevoWeJQhaybvQU"
        roles: [maintainer]
      - username: operator
        # password: operator
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$nzoI4RqiobprtzX/mJqe5Q$FY2Hi7mKep0DPHoaE++r/KD++WLUwTgRUFLde87j2Wg"
        roles: [operator]
      - username: admin
        # password: admin
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$joV9AVlyLS3pqq4mLrYokQ$pJLkTKrz9/LzEH6YaFljdz9k8dyBiryjwSB26Diiz9U"
        roles: [admin]

rbac:
  enabled: true
  roles:
    viewer:
      - "metrics:read"
      - "alarms:read"
      - "traces:read"
      - "logs:read"
      - "topology:read"
      - "profile:read"
      - "overview:read"
    maintainer:
      - "metrics:read"
      - "alarms:read"
      - "traces:read"
      - "logs:read"
      - "topology:read"
      - "profile:read"
      - "overview:read"
      - "cluster:read"
      - "inspect:read"
      - "ttl:read"
      - "config:read"
    operator:
      - "metrics:read"
      - "alarms:read"
      - "traces:read"
      - "logs:read"
      - "topology:read"
      - "profile:read"
      - "cluster:read"
      - "inspect:read"
      - "ttl:read"
      - "config:read"
      - "overview:read"
      - "overview:write"
      - "setup:read"
      - "setup:write"
      - "dashboard:read"
      - "dashboard:write"
      - "alarm-setup:read"
      - "alarm-setup:write"
      - "alarm-rule:read"
      - "alarm-rule:write"
      - "rule:read"
      - "rule:write"
      - "rule:write:structural"
      - "rule:delete"
      - "rule:debug"
      - "live-debug:read"
      - "live-debug:write"
      - "profile:enable"
    admin:
      - "*"
  landingByRole:
    viewer: /
    maintainer: /operate/cluster
    operator: /
    admin: /

session:
  ttlMinutes: 60
  cookieName: horizon_sid
  cookieSecure: false

audit:    { file: ./horizon-audit.jsonl }
setup:    { file: ./horizon-setup.json }
alarms:   { file: ./horizon-alarms.json }
debugLog: { enabled: false, file: ./horizon-wire.jsonl, maxBodyChars: 8192, redactAuthHeaders: true }
