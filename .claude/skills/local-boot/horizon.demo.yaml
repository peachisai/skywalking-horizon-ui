# Static demo-boot config for the Horizon UI BFF — points at the public
# Apache demo OAP (demo.skywalking.apache.org). The OAP network basic-auth
# password is NOT committed: it is read from ${OAP_PASSWORD} at boot.
# Ask the developer for it before booting and export it, e.g.
#   read -rs OAP_PASSWORD && export OAP_PASSWORD
# Boot via the `local-boot` skill (see SKILL.md), which passes this file
# through HORIZON_CONFIG as an ABSOLUTE path. Horizon login users below
# are throwaway dev credentials (password == username).

server:
  host: 127.0.0.1
  port: ${BFF_PORT:8081}

oap:
  queryUrl: https://demo.skywalking.apache.org:12800
  adminUrl: https://demo.skywalking.apache.org:17128
  zipkinUrl: https://demo.skywalking.apache.org:9412/zipkin
  timeoutMs: 15000
  auth:
    username: admin
    # Supplied via the environment so the demo password stays out of git.
    # interpolateEnv() in apps/bff/src/config/loader.ts expands ${OAP_PASSWORD}.
    password: "${OAP_PASSWORD}"

auth:
  backend: local
  local:
    users:
      - username: viewer
        # password: viewer
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$Gp175hqr+EF2iZ7v1fndvw$w6w9hDI59/UA+CRARChDoGRlR1TkVt6kqzApa021K+0"
        roles: [viewer]
      - username: maintainer
        # password: maintainer
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$w7ULwB3/jzH9FxVoHJ238A$y+qGoX6IPeOoGywLQCpfpAN5VJXcaevoWeJQhaybvQU"
        roles: [maintainer]
      - username: operator
        # password: operator
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$nzoI4RqiobprtzX/mJqe5Q$FY2Hi7mKep0DPHoaE++r/KD++WLUwTgRUFLde87j2Wg"
        roles: [operator]
      - username: admin
        # password: admin
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$joV9AVlyLS3pqq4mLrYokQ$pJLkTKrz9/LzEH6YaFljdz9k8dyBiryjwSB26Diiz9U"
        roles: [admin]

rbac:
  enabled: true
  roles:
    viewer:
      - "metrics:read"
      - "alarms:read"
      - "traces:read"
      - "logs:read"
      - "topology:read"
      - "profile:read"
      - "overview:read"
    maintainer:
      - "metrics:read"
      - "alarms:read"
      - "traces:read"
      - "logs:read"
      - "topology:read"
      - "profile:read"
      - "overview:read"
      - "cluster:read"
      - "inspect:read"
      - "ttl:read"
      - "config:read"
    operator:
      - "metrics:read"
      - "alarms:read"
      - "traces:read"
      - "logs:read"
      - "topology:read"
      - "profile:read"
      - "cluster:read"
      - "inspect:read"
      - "ttl:read"
      - "config:read"
      - "overview:read"
      - "overview:write"
      - "setup:read"
      - "setup:write"
      - "dashboard:read"
      - "dashboard:write"
      - "alarm-setup:read"
      - "alarm-setup:write"
      - "alarm-rule:read"
      - "alarm-rule:write"
      - "rule:read"
      - "rule:write"
      - "rule:write:structural"
      - "rule:delete"
      - "rule:debug"
      - "live-debug:read"
      - "live-debug:write"
      - "profile:enable"
    admin:
      - "*"
  landingByRole:
    viewer: /
    maintainer: /operate/cluster
    operator: /
    admin: /

session:
  ttlMinutes: 60
  cookieName: horizon_sid
  cookieSecure: false

audit:    { file: ./horizon-audit.jsonl }
setup:    { file: ./horizon-setup.json }
alarms:   { file: ./horizon-alarms.json }
debugLog: { enabled: false, file: ./horizon-wire.jsonl, maxBodyChars: 8192, redactAuthHeaders: true }
