# Copy this file to `horizon.yaml` and edit. Hot-reload picks up changes.

server:
  host: 127.0.0.1
  port: 8081

oap:
  # OAP admin host (port 17128 by default; runtime-rule / dsl-debugging / inspect / status live here).
  adminUrls:
    - http://127.0.0.1:17128
  # OAP query/status host (port 12800 by default; GraphQL + /status/*).
  statusUrl: http://127.0.0.1:12800
  # OAP's Zipkin v2 REST host. Defaults to a standalone port (9412 +
  # /zipkin) per the upstream Armeria binding. When OAP is configured
  # to share the GraphQL port (typical for the demo / k8s deploys),
  # use `<statusUrl>/zipkin` instead. Used by the Zipkin-source trace
  # views on mesh / k8s layers.
  zipkinUrl: http://127.0.0.1:9412/zipkin
  timeoutMs: 15000
  # Optional basic-auth credentials for outbound OAP calls (GraphQL,
  # /status, Zipkin /api/v2/*). The public demo at
  # `demo.skywalking.apache.org` gates traffic behind
  # skywalking:skywalking — set both fields below to use it.
  # auth:
  #   username: skywalking
  #   password: skywalking

auth:
  backend: local
  local:
    users: []
    # Example user (generate the argon2 hash with `pnpm --filter bff cli:hash`):
    # - username: admin
    #   passwordHash: "$argon2id$v=19$..."
    #   roles: [admin]

rbac:
  enabled: false
  roles:
    viewer: ["*:read"]
    editor: ["*:read", "rule:write", "rule:debug", "inspect:read"]
    admin: ["*"]

session:
  ttlMinutes: 60
  cookieName: horizon_sid
  cookieSecure: false

audit:
  file: ./horizon-audit.jsonl

# Per-layer setup overrides (priority / slots / caps / landing card config)
# persist here. Until OAP-side template management lands, this file is the
# source of truth for operator customization.
setup:
  file: ./horizon-setup.json

# Alarm-page setup — which OAP layers' RPM traffic is drawn as the
# background series on /alarms, and what MQE to fire per layer.
# Operators edit the saved file through the Alert Page Setup admin
# view; this section just tells the BFF where to keep the file.
alarms:
  file: ./horizon-alarms.json

debugLog:
  enabled: false
  file: ./horizon-wire.jsonl
  maxBodyChars: 8192
  redactAuthHeaders: true
